name: Publish to gh-pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '*.md'
      - '.nojekyll'
      - 'chemdoc_ai/**'
      - 'safetylens/**'
      - 'evalops_lite/**'
      - 'interviewmate_ai/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build static publish dir
        run: |
          set -euo pipefail
          mkdir -p _publish
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.cursor/' \
            --exclude='__pycache__/' \
            --exclude='backend/' \
            --exclude='scripts/' \
            --exclude='_publish/' \
            --exclude='.env*' \
            ./ _publish/
          test -f _publish/.nojekyll || touch _publish/.nojekyll
          echo '---- published files ----'
          ls -la _publish
          du -sh _publish

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_publish
          publish_branch: gh-pages
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Auto-publish ${{ github.sha }} from main"
