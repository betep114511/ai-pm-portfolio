name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Strip backend and dev artifacts before publish
        run: |
          # Pages only serves the static site (root + prototypes).
          # Backend, scripts and env templates never need to be public.
          rm -rf backend scripts
          rm -f .env.example .env.local
          rm -rf __pycache__ */__pycache__ */*/__pycache__
          # Keep .nojekyll so underscore-prefixed files (none today, but be safe)
          # are served as-is.
          test -f .nojekyll || touch .nojekyll
          echo '---- artifact contents ----'
          ls -la
          du -sh .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
